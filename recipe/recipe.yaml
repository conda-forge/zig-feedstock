schema_version: 1

context:
  build_number: 16
  name: zig
  version: "0.15.2"

  library: ${{ "Library/" if not unix else "" }}
  m2: ${{ "m2-" if not unix else "" }}
  sh: ${{ ".bat" if not unix else ".sh" }}
  bat: ${{ ".bat" if not unix else "" }}
  exe: ${{ ".exe" if not unix else "" }}

  # Zig target mapping (for zig -target flag, differs from GCC triplets)
  zig_triplet: >-
    ${{
      "x86_64-linux-gnu." ~ c_stdlib_version       if cross_target_platform_ == "linux-64"              else
      "aarch64-linux-gnu." ~ c_stdlib_version      if cross_target_platform_ == "linux-aarch64"         else
      "powerpc64le-linux-gnu." ~ c_stdlib_version  if cross_target_platform_ == "linux-ppc64le"         else
      "riscv64-linux-gnu." ~ c_stdlib_version      if cross_target_platform_ == "linux-riscv64"         else
      "s390x-linux-gnu." ~ c_stdlib_version        if cross_target_platform_ == "linux-s390x"           else
      "x86_64-macos-none"                          if cross_target_platform_ == "osx-64"                else
      "aarch64-macos-none"                         if cross_target_platform_ == "osx-arm64"             else
      "x86_64-windows-msvc"                        if cross_target_platform_ == "win-64"                else
      "aarch64-windows-msvc"                       if cross_target_platform_ == "win-arm64"             else
      "native"
    }}

  # Conda-style triplet for binary prefixes (e.g., x86_64-conda-linux-gnu-zig)
  conda_triplet: >-
    ${{
      "x86_64-conda-linux-gnu"                     if cross_target_platform_ == "linux-64"              else
      "aarch64-conda-linux-gnu"                    if cross_target_platform_ == "linux-aarch64"         else
      "powerpc64le-conda-linux-gnu"                if cross_target_platform_ == "linux-ppc64le"         else
      "riscv64-conda-linux-gnu"                    if cross_target_platform_ == "linux-riscv64"         else
      "s390x-conda-linux-gnu"                      if cross_target_platform_ == "linux-s390x"           else
      "x86_64-apple-darwin13.4.0"                  if cross_target_platform_ == "osx-64"                else
      "arm64-apple-darwin20.0.0"                   if cross_target_platform_ == "osx-arm64"             else
      "x86_64-w64-mingw32"                         if cross_target_platform_ == "win-64"                else
      "aarch64-w64-mingw32"                        if cross_target_platform_ == "win-arm64"             else
      "unknown"
    }}

  # Build mode detection helpers
  # Which platform builds cross-compilers for each target
  cross_build_platform: >-
    ${{
      "linux-64"                                   if cross_target_platform_ in [
          "linux-64",
          "linux-aarch64",
          "linux-ppc64le",
          "linux-riscv64",
          "linux-s390x"
       ]                                                                                                else
      build_platform                               if cross_target_platform_ in ["osx-64", "osx-arm64"] and build_platform in ["osx-64", "osx-arm64"] else
      build_platform                               if cross_target_platform_ in ["win-64", "win-arm64"] and build_platform in ["win-64", "win-arm64"] else
      "unknown"
    }}

  build_triplet: >-
    ${{
      "x86_64-conda-linux-gnu"                     if build_platform == "linux-64"                      else
      "x86_64-apple-darwin13.4.0"                  if build_platform == "osx-64"                        else
      "arm64-apple-darwin20.0.0"                   if build_platform == "osx-arm64"                     else
      "x86_64-w64-mingw32"                         if build_platform == "win-64"                        else
      "unknown"
    }}

  #    "aarch64-conda-linux-gnu"                    if build_platform == "linux-aarch64"                 else
  #    "powerpc64le-conda-linux-gnu"                if build_platform == "linux-ppc64le"                 else
  #    "aarch64-w64-mingw32"                        if build_platform == "win-arm64"                     else

  is_hosted_xcompiler: ${{ build_platform == target_platform and cross_target_platform_ != target_platform and cross_build_platform == build_platform }}
  is_unhosted_xcompiler: ${{ cross_target_platform_ == "osx-64" and target_platform == "osx-arm64" or cross_target_platform_ == "win-64" and target_platform == "win-arm64" }}
  xc_build_platform: >-
    ${{
      build_platform                               if is_hosted_xcompiler                               else
      "osx-arm64"                                  if cross_target_platform_ == "osx-64"                else
      "win-arm64"                                  if cross_target_platform_ == "win-64"                else
      "unknown"
    }}

  xc_build_triplet: >-
    ${{
      "arm64-apple-darwin20.0.0"                   if cross_target_platform_ == "osx-64"                else
      "aarch64-w64-mingw32"                        if cross_target_platform_ == "win-64"                else
      build_triplet
    }}

  is_native: ${{ build_platform == target_platform and cross_target_platform_ == build_platform }}
  is_cross_compiler: ${{ is_hosted_xcompiler or is_unhosted_xcompiler }}
  is_cross_target: ${{ build_platform != target_platform and cross_target_platform_ == target_platform }}
  
recipe:
  name: zig-package
  version: ${{ version }}

source:
  - url: https://github.com/ziglang/zig/archive/refs/tags/${{ version }}.tar.gz
    sha256: ebe6eb7006f6bbb72e54bd25d0675f2794084909d63a95aa315f2dcf2af5fd99
    patches:
      - patches/Lld.zig-prefer-shared-libcxx.patch
      - if: linux
        then:
          - patches/linux/build.zig-01-maxrss.patch
          - patches/linux/build.zig-02-doctest-forward-target.patch
          - patches/linux/posix.zig-glibc-2.17-fstat.patch
          - patches/linux/llvm.zig-triple-no-glibc-version.patch
          - patches/linux/Object.zig-elf-zstd-decompression.patch
          - patches/linux/Elf.zig-debug-tag-bare-TODO-panics.patch
          - patches/linux/link.zig-01-ldscript-relpath-and-l-flags.patch
          - patches/linux/link.zig-02-default-allow-so-scripts.patch
      - if: linux and (x86_64 or ppc64le)
        then:
          # Phase 0001: Architecture Support (add PowerPC64LE to CPU arch switches)
          - patches/ppc64le/0001-arch-support-relocation.zig.patch
          - patches/ppc64le/0001-arch-support-LdScript.zig.patch
          - patches/ppc64le/0001-arch-support-Elf.zig.patch
          - patches/ppc64le/0001-arch-support-Atom.zig.patch
          - patches/ppc64le/0001-arch-support-LinkerDefined.zig.patch
          - patches/ppc64le/0001-arch-support-ZigObject.zig.patch
          - patches/ppc64le/0001-arch-support-synthetic_sections.zig.patch
          - patches/ppc64le/0001-arch-support-eh_frame.zig.patch
          - patches/ppc64le/0001-arch-support-Thunk.zig.patch
          - patches/ppc64le/0001-arch-support-st-other-Object.zig.patch
          - patches/ppc64le/0001-arch-support-st-other-SharedObject.zig.patch
          # Phase 0002: Build Configuration (LLVM backend, library paths)
          - patches/ppc64le/0002-build-config-build.zig.patch
          # Phase 0003: Linker Redirection (comprehensive GCC linker with full flag translation)
          - patches/ppc64le/0003-linker-redirect-link.zig.patch
          - patches/ppc64le/0003-ldscript-output-format.patch
          - patches/ppc64le/0003-gcc-linker-comprehensive-Lld.zig.patch
      - if: not unix
        then:
          - patches/non_unix/build.zig-maxrss-search-prefix.patch
          - patches/non_unix/CMakeLists.txt-01-correct-LLVM_LIBRARIES.patch
          - patches/non_unix/Lld.zig-remove-ucrt.patch
          - patches/non_unix/CMakeLists.txt-02-MD-libzigcpp.patch
    target_directory: zig-source

build:
  number: ${{ build_number }}

outputs:
  # ==========================================================================
  # IMPLEMENTATION: zig_impl_$cross_target_platform_ (binaries + stdlib ONLY)
  # Contains actual zig compiler binary (triplet-prefixed) and standard library
  # NO activation scripts, NO wrappers - just the implementation
  # ==========================================================================
  - package:
      name: zig_impl_${{ cross_target_platform_ }}
    build:
      skip: not (is_native or is_cross_target) or cross_target_platform_ == "win-arm64" or cross_target_platform_ == "linux-s390x"
      dynamic_linking:
        missing_dso_allowlist:
          - if: osx
            then: /usr/lib/libSystem.B.dylib
          - if: not unix
            then: "*/VERSION.dll"
      script:
        env:
          BUILD_NUMBER: ${{ build_number }}
          CONDA_TRIPLET: ${{ conda_triplet }}
          ZIG_TRIPLET: ${{ zig_triplet }}

          CONDA_ZIG_BUILD: ${{ build_triplet ~ "-zig" }}
          CONDA_ZIG_HOST: ${{ conda_triplet ~ "-zig" }}
          
          CMAKE_FALLBACK: "0"
          
          # --- FORCING REBUILD of native zig due to incompatible previous build version in conda-forge ---
          # BUILD_NATIVE_ZIG: ${{ cross_target_platform_ == "linux-ppc64le" and is_cross_compiler }}

          # --- DEBUGGING ---
          # DEBUG_ZIG_BUILD: "1"
          # ZIG_USE_CACHE: "1"
    requirements:
      build:
        # --- Common build deps (all cases) ---
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib("c") }}
        - ${{ m2 }}bash >=5.2
        - ${{ m2 }}file
        - cmake >=3.5
        - ninja
        - perl 5.32.*
        - python 3.12.*
        - if: not unix
          then:
            - ${{ m2 }}coreutils
            - ${{ m2 }}findutils
            - ${{ m2 }}which
        - if: osx
          then:
            - libcxx ${{ llvm_version }}.*
        - if: (build_platform != target_platform)
          then:
            - llvmdev ${{ llvm_version }}.*  # llvm-config
            - if: osx
              then:
                - libxml2-devel

        # Self-hosting: build zig with zig
        - zig_impl_${{ build_platform }} >=0.15.2
      host:
        - clangdev ${{ llvm_version }}.*
        - libclang-cpp ${{ llvm_version }}.*
        - llvm ${{ llvm_version }}.*
        - libxml2-devel
        - lld ${{ llvm_version }}.*
        - zlib
        - zstd
        - if: osx
          then:
            - libcxx ${{ llvm_version }}.*
            - libxml2-devel
      run:
        - if: ppc64le
          then:
            # We redirect linking to gcc/ld.bfd
            - binutils_impl_${{ target_platform }} >=2.45
            - gcc_impl_${{ target_platform }} >=14.3
        - if: osx
          then:
            - libcxx ${{ llvm_version }}.*
      ignore_run_exports:
        by_name:
          - if: linux
            then:
              - libxml2-16
          - if: not unix
            then:
              - ucrt
              - vc14_runtime
    tests:
      # Package contents verification - impl has triplet-prefixed binary
      - package_contents:
          strict: true
          bin:
            - ${{ conda_triplet }}-zig
          files:
            - if: not ppc64le
              then:
                - ${{ library }}doc/langref.html
            - ${{ library }}lib/zig/{c,compiler_rt,fuzzer,ubsan_rt}.zig
            - ${{ library }}lib/zig/zig.h
            - ${{ library }}lib/zig/build-web/*
            - ${{ library }}lib/zig/c/{common,inttypes,stdlib,string,strings}.zig
            - ${{ library }}lib/zig/compiler/*
            - ${{ library }}lib/zig/compiler_rt/*
            - ${{ library }}lib/zig/docs/*
            - ${{ library }}lib/zig/include/*
            - ${{ library }}lib/zig/init/*
            - ${{ library }}lib/zig/libc/*
            - ${{ library }}lib/zig/libcxx/*
            - ${{ library }}lib/zig/libcxxabi/*
            - ${{ library }}lib/zig/libunwind/*
            - ${{ library }}lib/zig/libtsan/*
            - ${{ library }}lib/zig/std/*
            # Post-install tests
            - etc/conda/test-files/zig*
      # Shared libc++ discovery tests (patch 0008)
      - script:
          - python testing/test_libcxx_shared.py ${{ conda_triplet }}
        requirements:
          run:
            - python >=3.10
            - libcxx
        files:
          recipe:
            - testing/test_libcxx_shared.py
      # Functional test using triplet-prefixed binary
      - script:
          - if: not arm64
            then:
              - ${{ conda_triplet }}-zig version
              - ${{ conda_triplet }}-zig zen
              - ${{ conda_triplet }}-zig init
              - ${{ conda_triplet }}-zig test zig-source/test/behavior.zig
            else:
              - echo "Skip test on arm64"
        files:
          source:
            - zig-source/test

  # ==========================================================================
  # ACTIVATION: zig_$cross_target_platform_ (scripts)
  # Contains activation scripts, depends on zig_impl_$cross_target_platform_
  # NO binaries - just the environment setup
  # ==========================================================================
  - package:
      name: zig_${{ cross_target_platform_ }}
    build:
      skip: not (is_native or is_cross_compiler or is_cross_target)
      script:
        file: install_zig_activation.py
        env:
          ZIG_TRIPLET: ${{ zig_triplet }}
          CONDA_TRIPLET: ${{ conda_triplet }}
          CROSS_COMPILER: ${{ is_cross_compiler }}
          NATIVE_TRIPLET: ${{ xc_build_triplet }}
          # Zig toolchain identification (independent of gcc TOOLCHAIN)
          # Includes -zig suffix so value is directly usable as binary name
          CONDA_ZIG_BUILD: ${{ xc_build_triplet ~ "-zig" }}
          CONDA_ZIG_HOST: ${{ conda_triplet ~ "-zig" }}

          # --- FORCING REBUILD of native zig due to incompatible previous build version in conda-forge ---
          # BUILD_NATIVE_ZIG: ${{ cross_target_platform_ == "linux-ppc64le" and is_cross_compiler }}
          LLVM_VERSION: ${{ llvm_version }}
    requirements:
      build:
        - ${{ m2 }}bash
        - python 3.12.*
        # Need zig to compile .exe shims on non-Unix (cross-compiler shim)
        - if: is_cross_compiler and not unix
          then:
            - zig_impl_${{ xc_build_platform }} >=${{ version }}
      host:
        - if: not is_cross_compiler
          then:
            - ${{ pin_subpackage("zig_impl_" ~ cross_target_platform_, exact=True) }}
      run:
        # For native/cross-target: depend on zig_impl for same cross_target_platform_ (pin_subpackage works)
        # For cross-compiler: depend on zig_impl for BUILD platform (external package)
        - if: is_cross_compiler
          then:
            - zig_impl_${{ xc_build_platform }} >=${{ version }}
          else:
            - ${{ pin_subpackage("zig_impl_" ~ cross_target_platform_, exact=True) }}
        - if: cross_target_platform_ == "linux-ppc64le"
          then:
            # ppc64le patches redirect zig linking to gcc/ld.bfd
            # (LLD lacks PowerPC64 relocation support)
            - binutils_impl_${{ cross_target_platform_ }} >=2.45
            - gcc_impl_${{ cross_target_platform_ }} >=14.3
    tests:
      - package_contents:
          strict: true
          bin:
            - if: is_cross_compiler
              then:
                - ${{ conda_triplet }}-zig
          files:
            - etc/conda/activate.d/zig_activate${{ sh }}
            - etc/conda/deactivate.d/zig_deactivate${{ sh }}
            
            - ${{ library }}share/zig/wrappers/zig-cc${{ exe }}
            - ${{ library }}share/zig/wrappers/zig-cxx${{ exe }}
            
            - ${{ library }}share/zig/wrappers/zig-ar${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-ranlib${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-asm${{ bat }}
            - ${{ library }}share/zig/wrappers/zig-rc${{ bat }}
            - if: unix
              then:
                - share/zig/wrappers/_zig-cc-common.sh
                - share/zig/wrappers/zig-cxx-shared
                - share/zig/wrappers/zig-force-load-cc
                - share/zig/wrappers/zig-force-load-cxx
            - if: not unix
              then:
                - Library/share/zig/wrappers/zig-cxx-shared.exe
            # Post-install tests
            - etc/conda/test-files/zig*
      - script:
          - if: not arm64
            then:
              - ${{ conda_triplet }}-zig version
            else:
              - echo "Skip functional tests on arm64"
          # Verify CONDA_ZIG_BUILD and CONDA_ZIG_HOST are set by activation
          - if: unix
            then:
              - test -n "$CONDA_ZIG_BUILD"
              - test -n "$CONDA_ZIG_HOST"
              - echo "CONDA_ZIG_BUILD=$CONDA_ZIG_BUILD"
              - echo "CONDA_ZIG_HOST=$CONDA_ZIG_HOST"
              - test "$CONDA_ZIG_HOST" = "${{ conda_triplet }}-zig"
            else:
              - if not defined CONDA_ZIG_BUILD exit /b 1
              - if not defined CONDA_ZIG_HOST exit /b 1
              - echo CONDA_ZIG_BUILD=%CONDA_ZIG_BUILD%
              - echo CONDA_ZIG_HOST=%CONDA_ZIG_HOST%
          # Wrapper + functional validation tests (Python, cross-platform)
          - python testing/test_zig_toolchain.py
          # Cross-compiler .exe shim test (non-Unix only)
          - if: is_cross_compiler and not unix
            then:
              - set "CONDA_TRIPLET=${{ conda_triplet }}" && testing\test-cross-shim.bat
        requirements:
          run:
            - python >=3.10
            - if: ppc64le
              then:
                - bash >=5.2
                - libclang-cpp ${{ llvm_version }}.*
        files:
          recipe:
            - testing/test_zig_toolchain.py
            - testing/test-cross-shim.bat

  # ==========================================================================
  # METAPACKAGE: zig (native symlinks)
  # Creates unprefixed symlinks: zig -> $TRIPLET-zig
  # Only built when cross_target_platform_ == target_platform
  # ==========================================================================
  - package:
      name: zig
    build:
      skip: cross_target_platform_ != target_platform
      script:
        file: install_zig_symlinks.py
        env:
          CONDA_TRIPLET: ${{ conda_triplet }}
          cross_target_platform_: ${{ cross_target_platform_ }}
    requirements:
      build:
        - python 3.12.*
      host:
        # Host dep ensures targets exist during build for symlink validation
        - ${{ pin_subpackage("zig_" ~ cross_target_platform_, exact=True) }}
      run:
        - ${{ pin_subpackage("zig_" ~ cross_target_platform_, exact=True) }}
      run_exports:
        - ${{ pin_subpackage("zig", upper_bound="x.x.x") }}
    tests:
      - package_contents:
          strict: true
          bin:
            - zig
      - script:
          - if: not arm64
            then:
              - zig version
            else:
              - echo "Skip on cross-compiled platform"

  # ==========================================================================
  # TOOLCHAIN META-PACKAGE: zig-compiler (toolchain metapackage)
  # Bundles zig with C toolchain for full development environment
  # ==========================================================================
  - package:
      name: zig-compiler
    build:
      noarch: generic
      skip: cross_target_platform_ != target_platform
      script: echo "zig-compiler metapackage"
    requirements:
      run:
        - ${{ pin_subpackage("zig", exact=True) }}
        - c-compiler
        - if: linux
          then:
            - binutils_impl_${{ target_platform }}
        - if: osx
          then:
            - lld
            - llvm-tools
    tests:
      - script:
          - zig version
          - zig cc --version

about:
  homepage: https://ziglang.org/
  license: MIT
  license_file: zig-source/LICENSE
  summary: Zig is a general-purpose programming language and toolchain for maintaining robust, optimal, and reusable software.
  description: |
    Zig is a general-purpose programming language and toolchain for maintaining robust, optimal, and reusable software.
    Robust: Behavior is correct even for edge cases such as out of memory.
    Optimal: Write programs the best way they can behave and perform.
    Reusable: The same code works in many environments which have different constraints.
    Maintainable: Precisely communicate intent to the compiler and other programmers.
      The language imposes a low overhead to reading code and is resilient to changing requirements and environments.
  documentation: https://ziglang.org/documentation/${{ version }}/
  repository: https://github.com/ziglang/zig

extra:
  recipe-maintainers:
    - MementoRC
    - xmnlab
    - tdejager
  feedstock_name: zig
